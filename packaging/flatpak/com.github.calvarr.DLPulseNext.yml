# Flatpak manifest for DLPulse Next (pywebview GTK + Flask + yt-dlp).
#
# Local build (from repo root):
#   flatpak install flathub org.gnome.Platform//49 org.gnome.Sdk//49
#   bash packaging/flatpak/build.sh
#   flatpak run com.github.calvarr.DLPulseNext
#
# Flathub submission: replace the `dir` source with a git tag archive.

app-id: com.github.calvarr.DLPulseNext
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: dlpulse-next

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-download
  - --filesystem=xdg-config/dlpulse-next:create
  - --talk-name=org.freedesktop.Flatpak
  - --env=PYTHONSAFEPATH=1

modules:
  - name: aria2
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --without-applet
      - --without-libcares
      - --with-gnutls
    sources:
      - type: archive
        url: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.xz
        sha256: 60a420ad7085eb616cb6e2bdf0a7206d68ff3d37fb5a956dc44242eb2f79b66b

  - name: dlpulse-next
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      # PyGObject comes from org.gnome.Sdk; do not pip-install webview-gtk extra.
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
      - |
        for size in 128 256 512; do
          out="${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/com.github.calvarr.DLPulseNext.png"
          mkdir -p "$(dirname "$out")"
          rsvg-convert -w "${size}" -h "${size}" dlpulse_next/static/dlpulse_icon.svg -o "$out"
        done
      - install -Dm644 packaging/flatpak/com.github.calvarr.DLPulseNext.desktop
          ${FLATPAK_DEST}/share/applications/com.github.calvarr.DLPulseNext.desktop
      - install -Dm644 packaging/flatpak/com.github.calvarr.DLPulseNext.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/com.github.calvarr.DLPulseNext.metainfo.xml
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - .github
          - build
          - build-flatpak
          - dist
          - .venv
          - __pycache__
