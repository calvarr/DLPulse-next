    <circle cx="340" cy="340" r="260" stroke="#3080d8" stroke-width="1.8" opacity="0.26" style="fill:none;stroke:rgb(48, 128, 216);color:rgb(251, 251, 254);stroke-width:1.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.26;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
