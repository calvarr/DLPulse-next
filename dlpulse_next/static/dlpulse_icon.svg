  <path d="M 120,400 C 120,140 560,140 560,400" fill="none" stroke="#79c0ff" stroke-width="18" stroke-linecap="round" style="fill:none;stroke:rgb(121, 192, 255);color:rgb(251, 251, 254);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

