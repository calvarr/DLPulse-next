# Build DLPulse Next — Linux / Windows / macOS (PyInstaller)
#
# Outputs: NSIS installer (Windows), DMG (macOS), AppImage (Linux thin — uses host GTK/WebKit).
# Bundles: yt-dlp, ffmpeg (imageio-ffmpeg), aria2c, Flask UI, pywebview.
# Triggers: push to main/master, tags v*, manual workflow_dispatch.
# Releases: v* tags → stable release; main/master → prerelease dlpulse-next-continuous.

name: Build DLPulse Next

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-dlpulse-next-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            arch: x64
            artifact_name: dlpulse-next-windows
            artifact_file: build/DLPulseNext-Setup.exe
          - os: macos-15-intel
            target: macos
            arch: x86_64
            macos_deployment_target: "10.13"
            artifact_name: dlpulse-next-macos-x86_64
            artifact_file: build/DLPulseNext-x86_64.dmg
          - os: macos-14
            target: macos
            arch: arm64
            macos_deployment_target: "11.0"
            artifact_name: dlpulse-next-macos-arm64
            artifact_file: build/DLPulseNext-arm64.dmg
          - os: ubuntu-22.04
            target: linux
            arch: x86_64
            artifact_name: dlpulse-next-linux
            artifact_file: build/DLPulseNext-x86_64.AppImage

    runs-on: ${{ matrix.os }}
    name: DLPulse Next (${{ matrix.target }}-${{ matrix.arch }})
    timeout-minutes: 90
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install NSIS (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Linux build deps (GTK + WebKit + GStreamer + appimagetool)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          sudo apt-get update
          # Runtime stack is BUNDLED into the AppImage (self-contained), so the
          # full GTK/WebKit/GStreamer set + helper tools must be present here.
          sudo apt-get install -y --no-install-recommends \
            python3-dev python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.0 \
            libgtk-3-0 libwebkit2gtk-4.0-37 \
            libgirepository1.0-dev libcairo2-dev pkg-config \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-libav \
            gstreamer1.0-pulseaudio gstreamer1.0-alsa gstreamer1.0-gl \
            glib-networking libglib2.0-bin gsettings-desktop-schemas \
            libgdk-pixbuf2.0-bin librsvg2-common \
            adwaita-icon-theme hicolor-icon-theme \
            ffmpeg aria2 file
          # libfuse2 enables direct AppImage execution; on noble (24.04) it's libfuse2t64.
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      - name: Optional donate images (standalone bundle)
        shell: bash
        run: |
          set -e
          mkdir -p dlpulse_next/static/donate
          for url in \
            "https://raw.githubusercontent.com/calvarr/DLPulse/main/yt/flet_app/cofe.png" \
            "https://raw.githubusercontent.com/calvarr/DLPulse/master/yt/flet_app/cofe.png"
          do
            curl -fsSL -o dlpulse_next/static/donate/cofe.png "$url" && break || true
          done
          for url in \
            "https://raw.githubusercontent.com/calvarr/DLPulse/main/yt/BTC.jpeg" \
            "https://raw.githubusercontent.com/calvarr/DLPulse/master/yt/BTC.jpeg"
          do
            curl -fsSL -o dlpulse_next/static/donate/BTC.jpeg "$url" && break || true
          done
          ls -la dlpulse_next/static/donate || true

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e ".[build]"

      - name: Verify pywebview + pythonnet (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          python -c "import clr; import webview; print('pythonnet:', clr.__name__); print('webview:', webview.__file__)"

      - name: Verify imageio-ffmpeg binary
        run: |
          python -c "import imageio_ffmpeg as i; print('ffmpeg:', i.get_ffmpeg_exe())"

      - name: Record commit SHA (in-app build label)
        shell: bash
        run: printf '%s\n' "${GITHUB_SHA}" > dlpulse_next/build_commit.txt

      - name: Record release tag (version builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: printf '%s\n' "${GITHUB_REF_NAME}" > dlpulse_next/build_version.txt

      - name: Stage aria2c for bundle (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -e
          brew install aria2
          mkdir -p packaging/binaries
          cp "$(command -v aria2c)" packaging/binaries/aria2c
          chmod +x packaging/binaries/aria2c
          packaging/binaries/aria2c --version | head -1

      - name: Stage aria2c for bundle (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          mkdir -p packaging/binaries
          cp "$(command -v aria2c)" packaging/binaries/aria2c
          chmod +x packaging/binaries/aria2c
          packaging/binaries/aria2c --version | head -1

      - name: Stage aria2c for bundle (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '1.37.0'
          $zipName = "aria2-$ver-win-64bit-build1.zip"
          $url = "https://github.com/aria2/aria2/releases/download/release-$ver/$zipName"
          $dest = Join-Path $env:RUNNER_TEMP 'aria2-win'
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $dest -Force
          $exe = Get-ChildItem -Path $dest -Filter aria2c.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "aria2c.exe not found in $dest" }
          New-Item -ItemType Directory -Force -Path packaging/binaries | Out-Null
          Copy-Item -LiteralPath $exe.FullName -Destination packaging/binaries/aria2c.exe
          & packaging/binaries/aria2c.exe --version

      - name: PyInstaller
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: pyinstaller packaging/pyinstaller/dlpulse_next.spec

      - name: Bundle ffmpeg into PyInstaller dist (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: pwsh -NoProfile -File packaging/windows/bundle_ffmpeg_into_dist.ps1

      - name: Verify ffmpeg in Windows bundle
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $PWD 'dist\DLPulseNext\ffmpeg.exe'
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "ffmpeg.exe missing from dist\DLPulseNext (yt-dlp needs ffmpeg.exe next to the app)"
          }
          Write-Host "OK bundled ffmpeg: $exe"

      - name: Stage bundled WebView2 + .NET Desktop runtimes
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pwsh -NoProfile -File packaging/windows/stage_runtimes.ps1
          Get-Content packaging/windows/redist/manifest.txt

      - name: Verify WebView2 redist for installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $redist = 'packaging/windows/redist'
          $portable = Join-Path $redist 'WebView2Runtime'
          $bootstrap = Join-Path $redist 'installers/MicrosoftEdgeWebview2Setup.exe'
          $hasPortable = Test-Path (Join-Path $portable '*')
          $hasBootstrap = Test-Path -LiteralPath $bootstrap
          if (-not $hasPortable -and -not $hasBootstrap) {
            throw 'WebView2 missing: need portable WebView2Runtime or MicrosoftEdgeWebview2Setup.exe'
          }
          Write-Host "WebView2 portable=$hasPortable bootstrap=$hasBootstrap"

      - name: Verify pythonnet in Windows bundle
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hits = Get-ChildItem -Path dist/DLPulseNext -Recurse -Filter 'Python.Runtime.dll' -ErrorAction SilentlyContinue
          if (-not $hits) { throw 'Python.Runtime.dll missing from PyInstaller output (pythonnet not bundled)' }
          $hits | Select-Object -First 3 | ForEach-Object { Write-Host $_.FullName }
          $cfg = Get-ChildItem -Path dist/DLPulseNext -Recurse -Filter 'windows_runtimeconfig.json' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw 'windows_runtimeconfig.json missing from bundle' }
          Write-Host "runtimeconfig: $($cfg.FullName)"

      - name: Embed .NET and WebView2 into PyInstaller dist
        if: matrix.target == 'windows'
        shell: pwsh
        run: pwsh -NoProfile -File packaging/windows/embed_runtimes_into_dist.ps1 .

      - name: Verify embedded dotnet in Windows dist
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $fxr = 'dist\DLPulseNext\dotnet\host\fxr'
          if (-not (Test-Path $fxr)) { throw "dotnet not embedded in dist\DLPulseNext (run stage_runtimes + embed)" }
          Write-Host "OK embedded dotnet fxr: $fxr"

      - name: Build Windows installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1 .

      - name: Build macOS DMG
        if: matrix.target == 'macos'
        shell: bash
        env:
          DMG_ARCH: ${{ matrix.arch }}
        run: bash packaging/macos/make_dmg.sh .

      - name: Build Linux AppImage
        if: matrix.target == 'linux'
        shell: bash
        run: bash packaging/linux/make_appimage.sh .

      - name: Smoke-test Linux AppImage
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          file build/DLPulseNext-x86_64.AppImage
          # AppImage may not run from CI without FUSE; verify it extracts.
          build/DLPulseNext-x86_64.AppImage --appimage-extract >/dev/null
          ls squashfs-root/usr/bin/DLPulseNext
          # Verify the self-contained GTK/WebKit/GStreamer stack is bundled.
          ls squashfs-root/usr/lib/libwebkit2gtk-4.*.so* >/dev/null \
            || { echo "ERROR: libwebkit2gtk not bundled"; exit 1; }
          ls squashfs-root/usr/lib/libgtk-3.so* >/dev/null \
            || { echo "ERROR: libgtk-3 not bundled"; exit 1; }
          ls squashfs-root/usr/lib/webkit2gtk-4.*/WebKitWebProcess >/dev/null \
            || { echo "ERROR: WebKitWebProcess helper not bundled"; exit 1; }
          test "$(ls squashfs-root/usr/lib/gstreamer-1.0/libgst*.so 2>/dev/null | wc -l)" -ge 10 \
            || { echo "ERROR: GStreamer plugins not bundled"; exit 1; }
          ls squashfs-root/usr/lib/girepository-1.0/WebKit2-*.typelib >/dev/null \
            || { echo "ERROR: WebKit2 typelib not bundled"; exit 1; }
          echo "OK: self-contained stack bundled ($(ls squashfs-root/usr/lib/lib*.so* | wc -l) libs)"
          rm -rf squashfs-root

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_file }}
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    if: >-
      success() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: dlpulse-next-*
          merge-multiple: true

      - name: Stage release assets
        run: |
          set -e
          mkdir -p release-assets
          shopt -s nullglob
          for f in artifacts/* artifacts/**/*; do
            case "$f" in
              *.exe|*.dmg|*.AppImage) cp -f "$f" release-assets/ ;;
            esac
          done
          ls -la release-assets/

      - name: Verify release assets
        run: |
          test "$(find release-assets -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' \) | wc -l)" -ge 4

      - name: Move continuous tag (main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa dlpulse-next-continuous -m "DLPulse Next continuous build" "${GITHUB_SHA}"
          git push origin refs/tags/dlpulse-next-continuous --force

      - name: GitHub Release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: DLPulse Next ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true

      - name: GitHub Release (continuous)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dlpulse-next-continuous
          name: DLPulse Next (continuous)
          body: |
            Automated **DLPulse Next** continuous build from `${{ github.sha }}`.

            ### Downloads (yt-dlp, ffmpeg, aria2c bundled)
            | Platform | File |
            |----------|------|
            | Windows | `DLPulseNext-Setup.exe` |
            | macOS (Intel) | `DLPulseNext-x86_64.dmg` |
            | macOS (Apple Silicon) | `DLPulseNext-arm64.dmg` |
            | Linux | `DLPulseNext-x86_64.AppImage` |

            **Linux AppImage** needs host GTK3 + WebKit2GTK + GStreamer plugins installed (see [README — Linux](https://github.com/calvarr/DLPulse-next#linux)). For development, install from source.

            For a **stable** versioned release, push a tag `v*` (e.g. `v2.0.1`).
          prerelease: true
          make_latest: false
          files: release-assets/*
