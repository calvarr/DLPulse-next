<svg width="100%" viewBox="0 0 760 760" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">DLPulse icon light</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">DLPulse circular icon light variant with headphones over ECG waveform and gradient concentric circles.</desc>

  <defs>
    <clipPath id="ccl">
      <circle cx="340" cy="340" r="330"/>
    </clipPath>
  </defs>

  <!-- Background cerc — light -->
  <circle cx="340" cy="340" r="330" fill="#e8f1fb" style="fill:rgb(232, 241, 251);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="340" cy="340" r="314" fill="#ddeaf8" opacity="0.7" style="fill:rgb(221, 234, 248);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Concentric circles — albastru spre gri, subtil pe fond deschis -->
  <g clip-path="url(#ccl)" fill="none" style="fill:none;stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <circle cx="340" cy="340" r="60" stroke="#1a6abf" stroke-width="3.5" opacity="0.22" style="fill:none;stroke:rgb(26, 106, 191);color:rgb(251, 251, 254);stroke-width:3.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.22;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="110" stroke="#2272c8" stroke-width="3.0" opacity="0.18" style="fill:none;stroke:rgb(34, 114, 200);color:rgb(251, 251, 254);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="160" stroke="#2a7ad0" stroke-width="2.5" opacity="0.15" style="fill:none;stroke:rgb(42, 122, 208);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="210" stroke="#3585d8" stroke-width="2.0" opacity="0.12" style="fill:none;stroke:rgb(53, 133, 216);color:rgb(251, 251, 254);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="260" stroke="#4090de" stroke-width="1.8" opacity="0.10" style="fill:none;stroke:rgb(64, 144, 222);color:rgb(251, 251, 254);stroke-width:1.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="310" stroke="#5098e0" stroke-width="1.5" opacity="0.08" style="fill:none;stroke:rgb(80, 152, 224);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.08;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="360" stroke="#60a4e8" stroke-width="1.2" opacity="0.06" style="fill:none;stroke:rgb(96, 164, 232);color:rgb(251, 251, 254);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.06;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="340" r="410" stroke="#70aff0" stroke-width="1.0" opacity="0.04" style="fill:none;stroke:rgb(112, 175, 240);color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.04;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Baseline EKG -->
  <line x1="10" y1="390" x2="670" y2="390" stroke="#b0c8e8" stroke-width="1.5" clip-path="url(#ccl)" style="fill:rgb(0, 0, 0);stroke:rgb(176, 200, 232);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ECG glow -->
  <polyline clip-path="url(#ccl)" points="10,390 120,390 148,362 176,390 210,390 250,390 270,170 292,530 312,330 338,390 390,390 430,390 458,368 480,390 530,390 670,390" fill="none" stroke="#2272c8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.18" style="fill:none;stroke:rgb(34, 114, 200);color:rgb(251, 251, 254);stroke-width:14px;stroke-linecap:round;stroke-linejoin:round;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- ECG line -->
  <polyline clip-path="url(#ccl)" points="10,390 120,390 148,362 176,390 210,390 250,390 270,170 292,530 312,330 338,390 390,390 430,390 458,368 480,390 530,390 670,390" fill="none" stroke="#1a5db0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(26, 93, 176);color:rgb(251, 251, 254);stroke-width:4px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Pulse peak dot -->
  <circle cx="270" cy="170" r="9" fill="#1a5db0" opacity="0.95" style="fill:rgb(26, 93, 176);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="270" cy="170" r="17" fill="none" stroke="#1a5db0" stroke-width="2.5" opacity="0.25" style="fill:none;stroke:rgb(26, 93, 176);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Headphones arc -->
  <path d="M 120,400 C 120,140 560,140 560,400" fill="none" stroke="#2272c8" stroke-width="18" stroke-linecap="round" style="fill:none;stroke:rgb(34, 114, 200);color:rgb(251, 251, 254);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Left ear cup -->
  <rect x="76" y="340" width="66" height="140" rx="28" fill="#1a5db0" opacity="0.90" style="fill:rgb(26, 93, 176);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="92" y="358" width="34" height="104" rx="16" fill="#ddeaf8" opacity="0.75" style="fill:rgb(221, 234, 248);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Right ear cup -->
  <rect x="538" y="340" width="66" height="140" rx="28" fill="#1a5db0" opacity="0.90" style="fill:rgb(26, 93, 176);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="554" y="358" width="34" height="104" rx="16" fill="#ddeaf8" opacity="0.75" style="fill:rgb(221, 234, 248);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="340" y="618" font-family="monospace, sans-serif" font-size="42" font-weight="700" fill="#1a5db0" text-anchor="middle" opacity="0.80" letter-spacing="8" style="fill:rgb(26, 93, 176);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:monospace, sans-serif;font-size:42px;font-weight:700;text-anchor:middle;dominant-baseline:auto">DL<tspan fill="#d45f00" style="fill:rgb(212, 95, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace, sans-serif;font-size:42px;font-weight:700;text-anchor:middle;dominant-baseline:auto">PULSE</tspan></text>

</svg>