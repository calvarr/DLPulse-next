  <polyline clip-path="url(#cc)" points="10,390 120,390 148,362 176,390 210,390 250,390 270,170 292,530 312,330 338,390 390,390 430,390 458,368 480,390 530,390 670,390" fill="none" stroke="#1f6feb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.25" style="fill:none;stroke:rgb(31, 111, 235);color:rgb(251, 251, 254);stroke-width:14px;stroke-linecap:round;stroke-linejoin:round;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
