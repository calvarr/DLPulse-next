  <rect x="76" y="340" width="66" height="140" rx="28" fill="#58a6ff" opacity="0.95" style="fill:rgb(88, 166, 255);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="92" y="358" width="34" height="104" rx="16" fill="#1a1f2e" opacity="0.65" style="fill:rgb(26, 31, 46);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.65;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Right ear cup -->
  <rect x="538" y="340" width="66" height="140" rx="28" fill="#58a6ff" opacity="0.95" style="fill:rgb(88, 166, 255);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="554" y="358" width="34" height="104" rx="16" fill="#1a1f2e" opacity="0.65" style="fill:rgb(26, 31, 46);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.65;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text x="340" y="618" font-family="monospace, sans-serif" font-size="42" font-weight="700" fill="#58a6ff" text-anchor="middle" opacity="0.75" letter-spacing="8" style="fill:rgb(88, 166, 255);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:monospace, sans-serif;font-size:42px;font-weight:700;text-anchor:middle;dominant-baseline:auto">DL<tspan fill="#f0883e" style="fill:rgb(240, 136, 62);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:monospace, sans-serif;font-size:42px;font-weight:700;text-anchor:middle;dominant-baseline:auto">PULSE</tspan></text>

</svg>