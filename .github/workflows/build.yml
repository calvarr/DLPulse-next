# Build DLPulse Next — Linux / Windows / macOS (PyInstaller)
#
# Outputs: AppImage (Linux), NSIS installer (Windows), DMG (macOS).
# Bundles: yt-dlp, ffmpeg (imageio-ffmpeg), aria2c, Flask UI, pywebview.
# Triggers: push to main/master, tags v*, manual workflow_dispatch.
# Releases: v* tags → stable release; main/master → prerelease dlpulse-next-continuous.

name: Build DLPulse Next

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: build-dlpulse-next-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            artifact_name: dlpulse-next-linux
            artifact_file: build/DLPulseNext-x86_64.AppImage
          - os: windows-latest
            target: windows
            artifact_name: dlpulse-next-windows
            artifact_file: build/DLPulseNext-Setup.exe
          - os: macos-latest
            target: macos
            artifact_name: dlpulse-next-macos
            artifact_file: build/DLPulseNext.dmg

    runs-on: ${{ matrix.os }}
    name: DLPulse Next (${{ matrix.target }})
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Linux — GTK / WebKit / PyGObject (build + bundle)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential python3-dev meson ninja-build pkg-config \
            libgtk-3-0 libgtk-3-dev \
            libwebkit2gtk-4.0-37 libwebkit2gtk-4.0-dev \
            gir1.2-webkit2-4.0 gir1.2-gtk-3.0 \
            libgirepository1.0-dev gobject-introspection \
            libglib2.0-dev libcairo2-dev libpango1.0-dev \
            libgdk-pixbuf2.0-dev libharfbuzz-dev \
            gdk-pixbuf2.0-bin \
            fuse libfuse2 file

      - name: Install linuxdeploy (Linux, optional GTK plugin)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          curl -fsSL -o /tmp/linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20251107-1/linuxdeploy-x86_64.AppImage"
          chmod +x /tmp/linuxdeploy
          sudo mv /tmp/linuxdeploy /usr/local/bin/linuxdeploy
          if curl -fsSL -o /tmp/linuxdeploy-plugin-gtk \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage"; then
            chmod +x /tmp/linuxdeploy-plugin-gtk
            sudo mv /tmp/linuxdeploy-plugin-gtk /usr/local/bin/linuxdeploy-plugin-gtk
          else
            echo "linuxdeploy-plugin-gtk unavailable — using manual WebKit/GTK bundle only."
          fi

      - name: Install appimagetool (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          curl -fsSL -o /tmp/appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Install NSIS (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Optional donate images (standalone bundle)
        shell: bash
        run: |
          set -e
          mkdir -p dlpulse_next/static/donate
          for url in \
            "https://raw.githubusercontent.com/calvarr/DLPulse/main/yt/flet_app/cofe.png" \
            "https://raw.githubusercontent.com/calvarr/DLPulse/master/yt/flet_app/cofe.png"
          do
            curl -fsSL -o dlpulse_next/static/donate/cofe.png "$url" && break || true
          done
          for url in \
            "https://raw.githubusercontent.com/calvarr/DLPulse/main/yt/BTC.jpeg" \
            "https://raw.githubusercontent.com/calvarr/DLPulse/master/yt/BTC.jpeg"
          do
            curl -fsSL -o dlpulse_next/static/donate/BTC.jpeg "$url" && break || true
          done
          ls -la dlpulse_next/static/donate || true

      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e ".[build]"

      - name: Verify imageio-ffmpeg binary
        run: |
          python -c "import imageio_ffmpeg as i; print('ffmpeg:', i.get_ffmpeg_exe())"

      - name: Record commit SHA (in-app build label)
        shell: bash
        run: printf '%s\n' "${GITHUB_SHA}" > dlpulse_next/build_commit.txt

      - name: Record release tag (version builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: printf '%s\n' "${GITHUB_REF_NAME}" > dlpulse_next/build_version.txt

      - name: Stage aria2c for bundle (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          sudo apt-get install -y --no-install-recommends aria2
          mkdir -p packaging/binaries
          cp "$(command -v aria2c)" packaging/binaries/aria2c
          chmod +x packaging/binaries/aria2c
          packaging/binaries/aria2c --version | head -1

      - name: Stage aria2c for bundle (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -e
          brew install aria2
          mkdir -p packaging/binaries
          cp "$(command -v aria2c)" packaging/binaries/aria2c
          chmod +x packaging/binaries/aria2c
          packaging/binaries/aria2c --version | head -1

      - name: Stage aria2c for bundle (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = '1.37.0'
          $zipName = "aria2-$ver-win-64bit-build1.zip"
          $url = "https://github.com/aria2/aria2/releases/download/release-$ver/$zipName"
          $dest = Join-Path $env:RUNNER_TEMP 'aria2-win'
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -LiteralPath $zipPath -DestinationPath $dest -Force
          $exe = Get-ChildItem -Path $dest -Filter aria2c.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "aria2c.exe not found in $dest" }
          New-Item -ItemType Directory -Force -Path packaging/binaries | Out-Null
          Copy-Item -LiteralPath $exe.FullName -Destination packaging/binaries/aria2c.exe
          & packaging/binaries/aria2c.exe --version

      - name: PyInstaller
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: utf-8
        run: pyinstaller packaging/pyinstaller/dlpulse_next.spec

      - name: Build AppImage (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: bash packaging/linux/make_appimage.sh .

      - name: Build Windows installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1 .

      - name: Build macOS DMG
        if: matrix.target == 'macos'
        shell: bash
        run: bash packaging/macos/make_dmg.sh .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_file }}
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    if: >-
      success() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: dlpulse-next-*
          merge-multiple: true

      - name: Stage release assets
        run: |
          set -e
          mkdir -p release-assets
          shopt -s nullglob
          for f in artifacts/* artifacts/**/*; do
            case "$f" in
              *.AppImage|*.exe|*.dmg) cp -f "$f" release-assets/ ;;
            esac
          done
          ls -la release-assets/

      - name: Verify release assets
        run: |
          test "$(find release-assets -type f \( -name '*.AppImage' -o -name '*.exe' -o -name '*.dmg' \) | wc -l)" -ge 1

      - name: Move continuous tag (main/master)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa dlpulse-next-continuous -m "DLPulse Next continuous build" "${GITHUB_SHA}"
          git push origin refs/tags/dlpulse-next-continuous --force

      - name: GitHub Release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: DLPulse Next ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true

      - name: GitHub Release (continuous)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dlpulse-next-continuous
          name: DLPulse Next (continuous)
          body: |
            Automated **DLPulse Next** continuous build from `${{ github.sha }}`.

            ### Downloads (yt-dlp, ffmpeg, aria2c bundled)
            | Platform | File |
            |----------|------|
            | Linux | `DLPulseNext-x86_64.AppImage` |
            | Windows | `DLPulseNext-Setup.exe` |
            | macOS | `DLPulseNext.dmg` |

            **Linux:** AppImage bundles WebKitGTK/GTK for the native window (no extra packages on most distros).

            For a **stable** versioned release, push a tag `v*` (e.g. `v2.0.1`).
          prerelease: true
          make_latest: false
          files: release-assets/*
